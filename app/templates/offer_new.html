{% extends "base.html" %}
    {% block content %}
      <h1>Nova ponuda</h1>

      <form method="post" class="form">
        <label>Klijent</label>
        <select name="client_id" required>
          {% for c in clients %}
            <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>

        <label>Stavke (svaka stavka u novi red, format: opis | kolicina | cijena)</label>
        <textarea name="items" rows="8" placeholder="Npr: Ugradnja | 1 | 250
Materijal | 3 | 12.5" required></textarea>

        <label>Napomena</label>
        <textarea name="notes" rows="3" placeholder="Opcionalno..."></textarea>

        <button class="btn" type="submit">Kreiraj ponudu</button>
      </form>

      <p class="hint">Numeriranje: 01/2026, 02/2026... (reset po godini). Status default: <b>sent</b>.</p>
    {% endblock %}

{% extends "base.html" %}
{% block content %}
  <div class="row">
    <h1>Klijenti</h1>
    <a class="btn" href="/clients/new">Novi klijent</a>
  </div>

  <table class="table">
    <thead>
      <tr><th>Naziv</th><th>Email</th><th>OIB</th></tr>
    </thead>
    <tbody>
      {% for c in clients %}
      <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.email or "" }}</td>
        <td>{{ c.oib or "" }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
